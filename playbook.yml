---
- name: Ensure devops group and users exist on all servers
  hosts: all
  vars:
    user_password: redhat
  vars_files: user_list.yml
  become: true
  tasks:
    - name: Ensure devops group exists on all servers
      ansible.builtin.group:
        name: devops
        state: present

    - name: Ensure user exists on the webservers group
      ansible.builtin.user:
        name: "{{ item.name }}"
        uid: "{{ item.uid }}"
        groups: wheel,devops
        append: true
        shell: /bin/bash
        password: "{{ user_password | password_hash('sha512', 'theSecretSalt') }}"
      loop: "{{ users }}"
      when: 
        - (item.uid | string)[0] == '1'
        - inventory_hostname in groups['webservers']

    - name: Ensure user exists on the database group
      ansible.builtin.user:
        name: "{{ item.name }}"
        uid: "{{ item.uid }}"
        groups: wheel,devops
        append: true
        shell: /bin/bash
        password: "{{ user_password | password_hash('sha512', 'theSecretSalt') }}"
      loop: "{{ users }}"
      when: 
        - (item.uid | string)[0] == '2'
        - inventory_hostname in groups['database']
